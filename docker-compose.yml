version: "3.9"

services:
  api:
    build: .
    container_name: sales-assistant-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - DEBUG=${DEBUG:-false}
      - APP_NAME=${APP_NAME:-Sales Assistant Agent}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
